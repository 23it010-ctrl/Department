{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row mb-5 align-items-center">
        <div class="col-md-8">
            <h2 class="fw-bold text-primary-custom mb-1"><i class="fas fa-user-graduate me-2"></i> Student Dashboard</h2>
            <p class="text-muted mb-0">Welcome back, <strong>{{ user.name }}</strong>. Manage your profile and contribute to the community.</p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
            <a href="{{ url_for('submit_content') }}" class="btn btn-primary rounded-pill px-4 py-2 shadow-sm fw-bold">
                <i class="fas fa-paper-plane me-2"></i>SUBMIT NEW CONTENT
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <!-- Profile Edit Only -->
        <div class="col-lg-8">
            <div class="card shadow-lg border-custom rounded-4" style="background: var(--bg-card); color: var(--text-main);">
                <div class="card-header border-0 pt-4 px-4 pb-0 d-flex justify-content-between align-items-center" style="background: transparent;">
                    <h5 class="fw-bold mb-0" style="color: var(--text-main);"><i class="fas fa-user-edit text-info me-2"></i>Edit Student Profile</h5>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form action="{{ url_for('update_student_profile') }}" method="POST">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" style="color: var(--text-muted);">Full Name</label>
                                <input type="text" class="form-control border-custom py-2" name="name" value="{{ user.get('name', '') }}" required style="background: var(--bg-body); color: var(--text-main);">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" style="color: var(--text-muted);">Roll Number</label>
                                <input type="text" class="form-control border-custom py-2" name="roll_no" value="{{ user.get('roll_no', '') }}" required style="background: var(--bg-body); color: var(--text-main);">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" style="color: var(--text-muted);">Department</label>
                                <input type="text" class="form-control border-custom py-2" name="department" value="{{ user.get('department', '') }}" required style="background: var(--bg-body); color: var(--text-main);">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" style="color: var(--text-muted);">Email Address</label>
                                <input type="email" class="form-control border-custom py-2" name="email" value="{{ user.get('email', '') }}" required style="background: var(--bg-body); color: var(--text-main);">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" style="color: var(--text-muted);">Mobile Number</label>
                                <input type="text" class="form-control border-custom py-2" name="mobile" value="{{ user.get('mobile', '') }}" style="background: var(--bg-body); color: var(--text-main);">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold" style="color: var(--text-muted);">Age</label>
                                <input type="number" class="form-control border-custom py-2" name="age" value="{{ user.get('age', '') }}" style="background: var(--bg-body); color: var(--text-main);">
                            </div>
                            <div class="col-12 mt-5 text-center">
                                <button type="submit" class="btn btn-primary rounded-pill px-5 py-2 fw-bold shadow">
                                    <i class="fas fa-save me-2"></i> Save Changes
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
