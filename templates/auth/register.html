{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-white text-center py-4 border-0">
                    <h3 class="fw-bold mb-0" style="color: var(--primary-color);">Create an Account</h3>
                    <p class="text-muted mb-0 mt-2">Join the department portal</p>
                </div>
                <div class="card-body p-4 p-md-5 pt-0">
                    <form method="POST" action="{{ url_for('register') }}" enctype="multipart/form-data">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
                            <label for="name">Full Name</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                            <label for="email">Email address</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="roll_no" name="roll_no" placeholder="Roll Number / ID" required>
                            <label for="roll_no">Roll Number / ID</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="department" name="department" placeholder="Department" required>
                            <label for="department">Department</label>
                        </div>
                        <div class="form-floating mb-3">
                            <select class="form-select" id="year" name="year" aria-label="Year select">
                                <option value="First Year" selected>First Year</option>
                                <option value="Second Year">Second Year</option>
                                <option value="Third Year">Third Year</option>
                                <option value="Fourth Year">Fourth Year</option>
                            </select>
                            <label for="year">Year of Study</label>
                        </div>
                        <div class="mb-3">
                            <label for="photo" class="form-label text-muted ms-1"><small>Profile Photo (Optional)</small></label>
                            <input class="form-control" type="file" id="photo" name="photo" accept="image/*">
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>
                        <div class="form-floating mb-4">
                            <select class="form-select" id="role" name="role" aria-label="Role select">
                                <option value="student" selected>Student</option>
                                <option value="faculty">Faculty</option>
                            </select>
                            <label for="role">Select Role</label>
                        </div>
                        <div class="alert alert-info py-2" style="font-size: 0.9rem;">
                            <i class="fas fa-info-circle me-1"></i> New accounts require admin approval (except first user).
                        </div>
                        <div class="d-grid mb-3 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Register</button>
                        </div>
                        <div class="text-center">
                            <p class="mb-0 text-muted">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color); font-weight: 600;">Login here</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
