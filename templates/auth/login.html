{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h3 class="fw-bold text-center mb-4 text-primary-custom">Login Portal</h3>
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-lock fa-3x text-primary-custom"></i>
                        <p class="text-muted mt-2">Sign in to your account</p>
                    </div>
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-4">
                            <label class="form-label d-block text-center fw-bold small text-uppercase text-muted mb-3">Select Your Role</label>
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="login_role" id="role_student" value="student" checked autocomplete="off">
                                    <label class="btn btn-outline-primary w-100 rounded-pill py-2 fw-bold" for="role_student">
                                        <i class="fas fa-user-graduate me-2"></i>Student
                                    </label>
                                </div>
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="login_role" id="role_faculty" value="faculty" autocomplete="off">
                                    <label class="btn btn-outline-primary w-100 rounded-pill py-2 fw-bold" for="role_faculty">
                                        <i class="fas fa-chalkboard-teacher me-2"></i>Faculty
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                            <label for="email">Email address</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Login</button>
                        </div>
                        <div class="text-center">
                            <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color); font-weight: 600;">Register here</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
